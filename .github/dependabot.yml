version: 2
updates:
  # npm dependencies — weekly, grouped, security updates prioritised.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      production-deps:
        dependency-type: "production"
      dev-deps:
        dependency-type: "development"
  # Keep the GitHub Actions used in CI patched too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
