name: Deploy demo to GitHub Pages

# Disabled auto-publish: production runs on Vercel (server + DB + client portal).
# The static Pages export can't serve the server-only portal, so /account 404s
# there. Manual-only now (workflow_dispatch) so it never auto-publishes and
# confuses the live URL.
on:
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let in-progress deploys finish — cancelling them mid-run (the Pages build is
# large) meant rapid successive pushes never actually published. Queue instead,
# so the latest commit reliably reaches the live site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Strip server-only routes for static export
        # The CRM (API, admin dashboard, middleware) and the authenticated portal
        # pages require a server and can't be statically exported. Remove them for
        # the GitHub Pages preview only; they remain in the repo for Vercel.
        # The public client login & signup pages ARE kept so the demo can show
        # them (their forms switch to a friendly preview message without a server).
        run: |
          rm -rf app/api app/admin components/admin middleware.ts
          rm -rf "app/(marketing)/booking"
          rm -rf "app/account/page.tsx" "app/account/appointments" "app/account/assessments" "app/account/invoices"
          echo "Removed server-only routes for static build."

      - name: Configure Pages (auto-enables Pages if needed)
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Resolve Pages base path
        id: base
        run: echo "path=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Build static export
        env:
          GHPAGES: 'true'
          PAGES_BASE_PATH: ${{ steps.base.outputs.path }}
          NEXT_PUBLIC_CRM_ENABLED: 'false'
        run: npm run build

      - name: Disable Jekyll (serve _next/)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
