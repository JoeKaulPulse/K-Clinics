name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - claude/k-clinics-site-rebuild-h3tRV
      - main
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Strip server-only routes for static export
        # The CRM (API, admin dashboard, middleware) requires a server and can't
        # be statically exported. Remove them for the GitHub Pages preview only;
        # they remain in the repo for the Vercel production deploy.
        run: |
          rm -rf app/api app/admin components/admin middleware.ts
          rm -rf "app/(marketing)/booking"
          echo "Removed server-only routes for static build."

      - name: Configure Pages (auto-enables Pages if needed)
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Resolve Pages base path
        id: base
        run: echo "path=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Build static export
        env:
          GHPAGES: 'true'
          PAGES_BASE_PATH: ${{ steps.base.outputs.path }}
          NEXT_PUBLIC_CRM_ENABLED: 'false'
        run: npm run build

      - name: Disable Jekyll (serve _next/)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
