name: Typecheck

# Fast correctness gate on every PR + main: regenerate the Prisma client and run
# the TypeScript compiler. Catches syntax/type errors (e.g. stray smart-quotes in
# a generated backlog entry) BEFORE a merge/deploy, rather than as a failed Vercel
# build. Make this a required check in branch protection to hard-gate merges —
# important now that the build routine can merge autonomously.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the migration-drift guard can diff against origin/main
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      # ClinicOS tenant-isolation guard (BLD-300): no DB needed; fails if Academy
      # query scoping regresses or the scoped-model set drifts from the schema.
      - run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/test-tenant-isolation.ts
      # ClinicOS scope-validity guard (BLD-300/301): constructs each scoped Academy
      # read against the generated client and fails on a Prisma ValidationError —
      # catches an injected filter that tsc can't (e.g. { tenantId: null } on a
      # NOT NULL column, which took the live Academy down once). No DB needed.
      - run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/test-scope-query-valid.mjs
      # ClinicOS RLS-seam guard (BLD-301, Ring 1d): the app-side GUC plumbing must
      # stay a prod no-op until RLS ships (flag defaults OFF) and the GUC it sets
      # must match the name/scope the RLS policy reads. No DB needed.
      - run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/test-rls-seam.mjs
      # Schema/migration drift guard: a datamodel change to prisma/schema.prisma
      # must ship with a matching migration file, so the live DB can never fall
      # behind the code (which took /admin/bookings down — Booking.prepaid* was
      # added with no migration, BLD-399). No DB needed; pure datamodel + git diff.
      - run: node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON scripts/check-migration-drift.mjs
